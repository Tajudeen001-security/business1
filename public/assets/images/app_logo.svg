<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d98b"/>
      <stop offset="45%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#9c7a24"/>
    </linearGradient>
    <radialGradient id="faceGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1f1f1f"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>

  <!-- outer case -->
  <circle cx="128" cy="128" r="118" fill="none" stroke="url(#goldGrad)" stroke-width="7"/>
  <!-- watch face -->
  <circle cx="128" cy="128" r="98" fill="url(#faceGrad)" stroke="url(#goldGrad)" stroke-width="3"/>

  <!-- crown -->
  <rect x="240" y="118" width="14" height="20" rx="3" fill="url(#goldGrad)"/>

  <!-- hour marks -->
  <g stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round">
    <line x1="128" y1="42" x2="128" y2="58"/>
    <line x1="128" y1="198" x2="128" y2="214"/>
    <line x1="42" y1="128" x2="58" y2="128"/>
    <line x1="198" y1="128" x2="214" y2="128"/>
  </g>

  <!-- watch hands -->
  <g stroke="url(#goldGrad)" stroke-linecap="round">
    <line x1="128" y1="128" x2="128" y2="76" stroke-width="6"/>
    <line x1="128" y1="128" x2="164" y2="128" stroke-width="6"/>
  </g>
  <circle cx="128" cy="128" r="7" fill="url(#goldGrad)"/>

  <!-- monogram letters -->
  <text x="128" y="176" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="700" fill="url(#goldGrad)" letter-spacing="2">BTP</text>
</svg>
